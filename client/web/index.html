<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="airread">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>airread</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #flutter-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F5F5F5 0%, #E8E8E8 100%);
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }
    #flutter-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      border-radius: 16px;
      background: #2196F3;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(33, 150, 243, 0.25);
    }
    .loading-logo img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
    }
    .loading-title {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #BBDEFB;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    const serviceWorkerVersion = null;
  </script>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="flutter-loading">
    <div class="loading-logo">
      <img src="icons/Icon-192.png" alt="Logo" />
    </div>
    <div class="loading-title">AirRead</div>
    <div class="loading-subtitle">智能阅读助手</div>
    <div class="loading-spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('flutter-loading');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(function() {
          loading.remove();
        }, 300);
      }
    });
  </script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            canvasKitBaseUrl: "canvaskit/",
            fontFallbackBaseUrl: "https://fonts.gstatic.cn/s/"
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
