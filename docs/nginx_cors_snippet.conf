# 在宝塔「反向代理」的 location 里加入以下 CORS 配置
# 替换原有的 #PROXY-CONF-START 到 #PROXY-CONF-END 之间的 location 块

    #PROXY-CONF-START
    location ^~ / {
      # CORS：允许跨域（公网 IP 访问时必需）
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'content-type,x-api-key,x-device-id,x-auth-token,x-platform,accept' always;
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'content-type,x-api-key,x-device-id,x-auth-token,x-platform,accept';
        add_header 'Access-Control-Max-Age' 86400;
        return 204;
      }
      
      proxy_pass http://127.0.0.1:9000;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Real-Port $remote_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header REMOTE-HOST $remote_addr;
      
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    #PROXY-CONF-END
